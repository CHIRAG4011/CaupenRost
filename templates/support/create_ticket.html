{% extends 'base.html' %}

{% block title %}Create Support Ticket - CaupenRost{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i data-feather="plus-circle" class="me-2"></i>Create Support Ticket</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('create_ticket') }}">
                        <div class="mb-4">
                            <label for="ticket_type" class="form-label">Ticket Type <span class="text-danger">*</span></label>
                            <select class="form-select" id="ticket_type" name="ticket_type" required>
                                <option value="">Select a ticket type...</option>
                                <option value="damaged_order" {% if selected_order %}selected{% endif %}>Damaged Order</option>
                                <option value="custom_order">Custom Order Request</option>
                                <option value="assistance">General Assistance</option>
                                <option value="refund">Refund Request</option>
                                <option value="delivery">Delivery Issue</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="mb-4" id="order_select_container" {% if not selected_order %}style="display: none;"{% endif %}>
                            <label for="order_id" class="form-label">Related Order (Optional)</label>
                            <select class="form-select" id="order_id" name="order_id">
                                <option value="">No specific order</option>
                                {% for order in orders %}
                                <option value="{{ order.id }}" {% if selected_order and selected_order.id == order.id %}selected{% endif %}>
                                    Order #{{ order.id }} - {{ order.created_at.strftime('%b %d, %Y') }} - Rs. {{ '%.2f'|format(order.total) }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="subject" class="form-label">Subject <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="subject" name="subject" 
                                   placeholder="Brief description of your issue" required maxlength="200"
                                   {% if selected_order %}value="Issue with Order #{{ selected_order.id }}"{% endif %}>
                        </div>

                        <div class="mb-4">
                            <label for="priority" class="form-label">Priority</label>
                            <select class="form-select" id="priority" name="priority">
                                <option value="low">Low</option>
                                <option value="normal" selected>Normal</option>
                                <option value="high">High</option>
                                <option value="urgent">Urgent</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label">Description <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="description" name="description" rows="6" 
                                      placeholder="Please describe your issue in detail..." required></textarea>
                            <div class="form-text">Provide as much detail as possible to help us assist you quickly.</div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('support_center') }}" class="btn btn-outline-secondary">
                                <i data-feather="arrow-left" class="me-1"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i data-feather="send" class="me-1"></i>Submit Ticket
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const ticketType = document.getElementById('ticket_type');
    const orderContainer = document.getElementById('order_select_container');
    
    ticketType.addEventListener('change', function() {
        if (this.value === 'damaged_order' || this.value === 'delivery' || this.value === 'refund') {
            orderContainer.style.display = 'block';
        } else {
            orderContainer.style.display = 'none';
        }
    });
});
</script>
{% endblock %}
