{% extends "base.html" %}
{% block title %}Login — CaupenRost{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="auth-card reveal active">
                    <div class="auth-card-header">
                        <div class="auth-logo">
                            <svg width="26" height="26" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M16 3C16 3 10 7 10 14c0 3.3 2.7 6 6 6s6-2.7 6-6C22 7 16 3 16 3z" fill="currentColor" opacity="0.9"/>
                                <path d="M16 20v9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                <path d="M13 24.5c0 0 1-2.5 3-2.5s3 2.5 3 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/>
                                <ellipse cx="11" cy="12" rx="2.5" ry="4" fill="currentColor" opacity="0.55" transform="rotate(-20 11 12)"/>
                                <ellipse cx="21" cy="12" rx="2.5" ry="4" fill="currentColor" opacity="0.55" transform="rotate(20 21 12)"/>
                            </svg>
                            CaupenRost
                        </div>
                        <h2>Welcome Back</h2>
                        <p>Sign in to your account to continue</p>
                    </div>
                    <div class="auth-card-body">
                        <form method="post" class="needs-loading">
                            <div class="mb-4">
                                <label for="username" class="form-label">Username or Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user" style="font-size:0.8rem;"></i></span>
                                    <input type="text" class="form-control" id="username" name="username"
                                           placeholder="Enter your username or email" required autofocus>
                                </div>
                            </div>

                            <div class="mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <label for="password" class="form-label mb-0">Password</label>
                                </div>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock" style="font-size:0.8rem;"></i></span>
                                    <input type="password" class="form-control" id="password" name="password"
                                           placeholder="Enter your password" required>
                                    <button type="button" class="input-group-text" style="cursor:pointer;" onclick="togglePwd('password', this)">
                                        <i class="fas fa-eye" style="font-size:0.8rem;"></i>
                                    </button>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-gold w-100 mb-3" style="padding:13px;">
                                <i class="fas fa-sign-in-alt me-2"></i>Sign In
                            </button>
                        </form>

                        <div class="auth-divider">or</div>

                        <div class="text-center">
                            <p class="mb-3" style="color:var(--cream-muted);font-size:0.88rem;">Don't have an account?</p>
                            <a href="{{ url_for('register') }}" class="btn btn-outline-brown w-100">
                                <i class="fas fa-user-plus me-2"></i>Create Account
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function togglePwd(fieldId, btn) {
    const field = document.getElementById(fieldId);
    const icon = btn.querySelector('i');
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
{% endblock %}
